name: GCP Deploy & Data Upload

on:
  workflow_dispatch:
  push:
    branches:
      - cloud-provider-testing
    paths:
      - 'data/**'
      - 'api_service/**'
      - 'preprocessing_service/**'
      - 'recommender_service/**'
      - 'ui_service/**'
      - '.github/workflows/deploy.yml'

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  BUCKET_NAME: ${{ secrets.GCP_BUCKET_NAME }}
  REGION: ${{ secrets.GCP_REGION }}
  REPOSITORY: ${{ secrets.ARTIFACT_REPOSITORY }}

jobs:
  upload-data:
    name: Upload Data to GCS
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Authenticate with Google Cloud
      uses: google-github-actions/auth@v1
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up gcloud SDK
      uses: google-github-actions/setup-gcloud@v1
      with:
        project_id: ${{ env.PROJECT_ID }}

    - name: Upload CSV files to GCS
      run: |
        set -e
        echo "Contenuto della cartella data:"
        ls -laR data/

        echo "Caricamento file CSV su gs://${BUCKET_NAME}/raw/"
        gsutil -m cp -r $(find data/ -name '*.csv') gs://${BUCKET_NAME}/raw/
        echo "Upload completato."


  build-push-images:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: upload-data

    strategy:
      matrix:
        service: [api_service, preprocessing_service, recommender_service, ui_service]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Authenticate with Google Cloud
      uses: google-github-actions/auth@v1
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up gcloud SDK
      uses: google-github-actions/setup-gcloud@v1
      with:
        project_id: ${{ env.PROJECT_ID }}

    - name: Configure Docker for Artifact Registry
      run: |
        gcloud auth configure-docker ${REGION}-docker.pkg.dev --quiet

    - name: Build and Push Docker Image for ${{ matrix.service }}
      run: |
        set -e
        IMAGE_NAME=${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPOSITORY}/${{ matrix.service }}
        
        echo "Building image: $IMAGE_NAME"
        cd ${{ matrix.service }}
        docker build -t $IMAGE_NAME:${{ github.sha }} .
        docker tag $IMAGE_NAME:${{ github.sha }} $IMAGE_NAME:latest

        echo "Pushing images to Artifact Registry"
        docker push $IMAGE_NAME:${{ github.sha }}
        docker push $IMAGE_NAME:latest

        echo "✅ Build & Push completato per ${{ matrix.service }}"
