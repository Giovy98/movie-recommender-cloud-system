name: GCP Deploy, Data Upload & GKE Configuration

on:
  workflow_dispatch:
  push:
    branches:
      - google-cloud-project-main
    paths:
      - 'data/**'
      - 'api_service/**'
      - 'preprocessing_service/**'
      - 'recommender_service/**'
      - 'ui_service/**'
      - '.github/workflows/deploy.yml'
      - 'k8s-gke/**'

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ secrets.GCP_REGION }}
  DOCKER_EMAIL: ${{ secrets.DOCKER_EMAIL }}
  ARTIFACT_REPOSITORY: ${{ secrets.ARTIFACT_REPOSITORY }}

jobs:
  upload-data:
    name: Upload Data to GCS
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Google Auth
      uses: google-github-actions/auth@v1
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up gcloud
      uses: google-github-actions/setup-gcloud@v1
      with:
        project_id: ${{ secrets.GCP_PROJECT_ID }}

    - name: Upload data to GCS
      run: |
        echo "Contenuto della cartella data:"
        ls -la data/*
        gsutil -m cp -r data/*.csv gs://${{ secrets.GCP_BUCKET_NAME }}/raw
        echo "Dati caricati con successo su gs://${{ secrets.GCP_BUCKET_NAME }}/raw"

  build-push-images:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    needs: upload-data

    strategy:
      matrix:
        service: [api_service, preprocessing_service, recommender_service, ui_service]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Google Auth
      uses: google-github-actions/auth@v1
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v1
      with:
        project_id: ${{ secrets.GCP_PROJECT_ID }}

    - name: Configure Docker for Artifact Registry
      run: |
        gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

    - name: Build and push image for ${{ matrix.service }}
      run: |
        cd ${{ matrix.service }}
        docker build -t ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REPOSITORY }}/${{ matrix.service }}:${{ github.sha }} .
        docker tag ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REPOSITORY }}/${{ matrix.service }}:${{ github.sha }} ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REPOSITORY }}/${{ matrix.service }}:latest
        docker push ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REPOSITORY }}/${{ matrix.service }}:${{ github.sha }}
        docker push ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REPOSITORY }}/${{ matrix.service }}:latest

  configure-gke:
    name: Configure GKE & Deploy Argo Workflow
    runs-on: ubuntu-latest
    needs: build-push-images

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Google Auth
      uses: google-github-actions/auth@v1
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2
      with:
        project_id: ${{ secrets.GCP_PROJECT_ID }}

    - name: Install GKE auth plugin
      run: gcloud components install gke-gcloud-auth-plugin

    - name: Install kubectl
      run: gcloud components install kubectl --quiet

    - name: Get GKE credentials
      run: |
        gcloud container clusters get-credentials ${{ secrets.GCP_GKE_CLUSTER_NAME }} \
          --zone ${{ secrets.GCP_ZONE }} \
          --project ${{ secrets.GCP_PROJECT_ID }}

    - name: Create namespaces
      run: |
        kubectl get namespace argo || kubectl create namespace argo
        kubectl get namespace deployment || kubectl create namespace deployment

    - name: Install Argo Workflows
      run: |
        kubectl apply -n argo -f https://github.com/argoproj/argo-workflows/releases/download/v3.6.5/install.yaml

    - name: Decode GCP Service Account Key and .env
      run: |
        echo "${{ secrets.GCP_SA_KEY }}" | base64 --decode > ./gcs-key.json
        echo "${{ secrets.ENV_FILE }}" > .env

    - name: Create Docker Registry Secret for argo
      run: |
        kubectl delete secret gcr-json-key-gke-argo -n argo --ignore-not-found
        kubectl create secret docker-registry gcr-json-key-gke-argo \
          --docker-server=${{ secrets.GCP_REGION }}-docker.pkg.dev \
          --docker-username=_json_key \
          --docker-password="$(cat gcs-key.json)" \
          --docker-email=${{ secrets.DOCKER_EMAIL }} \
          --namespace=argo

    - name: Create Docker Registry Secret for deployment
      run: |
        kubectl delete secret gcr-json-key-gke-deployment -n deployment --ignore-not-found
        kubectl create secret docker-registry gcr-json-key-gke-deployment \
          --docker-server=${{ secrets.GCP_REGION }}-docker.pkg.dev \
          --docker-username=_json_key \
          --docker-password="$(cat gcs-key.json)" \
          --docker-email=${{ secrets.DOCKER_EMAIL }} \
          --namespace=deployment

    - name: Create GCS key secret for argo and deployment
      run: |
        kubectl delete secret gcs-key-gke-argo -n argo --ignore-not-found
        kubectl create secret generic gcs-key-gke-argo --from-file=key.json=./gcs-key.json --namespace=argo

        kubectl delete secret gcs-key-gke-deployment -n deployment --ignore-not-found
        kubectl create secret generic gcs-key-gke-deployment --from-file=key.json=./gcs-key.json --namespace=deployment

    - name: Create ConfigMaps
      run: |
        kubectl delete configmap service-config-gke-argo -n argo --ignore-not-found
        kubectl create configmap service-config-gke-argo --from-env-file=.env --namespace=argo

        kubectl delete configmap service-config-gke-deployment -n deployment --ignore-not-found
        kubectl create configmap service-config-gke-deployment --from-env-file=.env --namespace=deployment

    - name: Ensure RoleBinding for Argo
      run: |
        kubectl get rolebinding default-admin -n argo || kubectl create rolebinding default-admin \
          --clusterrole=admin \
          --serviceaccount=argo:default \
          --namespace=argo

    - name: Install Argo CLI
      run: |
        ARGO_VERSION="v3.6.5"
        curl -sLO https://github.com/argoproj/argo-workflows/releases/download/${ARGO_VERSION}/argo-linux-amd64.gz
        gunzip argo-linux-amd64.gz
        chmod +x argo-linux-amd64
        sudo mv argo-linux-amd64 /usr/local/bin/argo
        argo version

    - name: Replace Variables in Workflow YAML
      run: |
        export REGION=${{ secrets.GCP_REGION }}
        export PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}
        export ARTIFACT_REPOSITORY=${{ secrets.ARTIFACT_REPOSITORY }}
        envsubst < k8s-gke/argoWorkflow/job-test-cloud.yaml > k8s-gke/argoWorkflow/job-test-cloud-2.yaml
        envsubst < k8s-gke/deployment/k8s-cloud-api.yml > k8s-gke/deployment/k8s-cloud-api-2.yml
        envsubst < k8s-gke/deployment/k8s-cloud-ui.yml > k8s-gke/deployment/k8s-cloud-ui-2.yml

    - name: Submit Argo Workflow
      run: |
        argo submit k8s-gke/argoWorkflow/job-test-cloud-2.yaml -n argo --watch

    - name: Deploy API and UI Services
      run: |
        echo "Applying Kubernetes deployments and services..."
        kubectl apply -f k8s-gke/deployment/k8s-cloud-api-2.yml
        kubectl apply -f k8s-gke/deployment/k8s-cloud-ui-2.yml

    - name: Clean Up Sensitive Files
      if: always()
      run: |
        rm -f ./gcs-key.json
        rm -f .env
        echo "File sensibili eliminati"