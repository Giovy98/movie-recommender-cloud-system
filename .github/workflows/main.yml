name: CI/CD Pipeline for Google Cloud Provider 

on:
  push:
    branches: [ cloud-provider-testing ]
  workflow_dispatch:  # Per attivare manualmente il workflow
  

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  TF_VERSION: '1.5.0'
  WORKING_DIR: './terraform-gcp'
  
jobs:
  provision-infrastructure:
    name: Provision GCP Infrastructure
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    
    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v2
      with:
        terraform_version: ${{ env.TF_VERSION }}
        terraform_wrapper: false
      
    - name: Google Auth
      id: auth
      uses: google-github-actions/auth@v1
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}
  
    - name: Crea il file terraform.tfvars
      working-directory: ${{ env.WORKING_DIR }}
      run: |
        cat > terraform.tfvars << EOF
        project_id           = "${{ secrets.GCP_PROJECT_ID }}"
        region               = "${{ secrets.GCP_REGION }}"
        credentials_file     = "sa-key.json"
        bucket_name          = "${{ secrets.GCP_BUCKET_NAME_TERRAFORM }}"
        artifact_repository  = "${{ secrets.ARTIFACT_REPOSITORY_TERRAFORM }}"
        EOF
    
    - name: Salva service key
      working-directory: ${{ env.WORKING_DIR }}
      run: echo '${{ secrets.GCP_SA_KEY }}' > sa-key.json
    
    - name: Terraform init
      working-directory: ${{ env.WORKING_DIR }}
      run: terraform init    
      
    - name: Terraform format
      working-directory: ${{ env.WORKING_DIR }}
      run: terraform fmt -recursive 
      
    - name: Terraform validate
      working-directory: ${{ env.WORKING_DIR }}
      run: terraform validate    
      
    - name: Terraform plan
      working-directory: ${{ env.WORKING_DIR }}
      run: terraform plan -no-color -out=tfplan
    
    - name: Check if infrastructure changes are needed
      id: tfcheck
      working-directory: ${{ env.WORKING_DIR }}
      run: |
        terraform show -no-color tfplan > tfplan.txt
        if grep -q "No changes. Infrastructure is up-to-date." tfplan.txt; then
          echo "apply_needed=false" >> $GITHUB_OUTPUT
        else
          echo "apply_needed=true" >> $GITHUB_OUTPUT
        fi
      
    - name: Terraform apply
      if: steps.tfcheck.outputs.apply_needed == 'true'
      working-directory: ${{ env.WORKING_DIR }}
      run: terraform apply -auto-approve tfplan

    - name: Rimuovi service key
      if: always()
      working-directory: ${{ env.WORKING_DIR }}
      run: rm -f sa-key.json
       
  setup-and-upload-data:
    name: Setup e Carica dati
    runs-on: ubuntu-latest
    needs: provision-infrastructure

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    # Autenticazione con Google Cloud (approccio aggiornato)
    - name: Google Auth
      id: auth
      uses: google-github-actions/auth@v1
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v1
      with:
        project_id: ${{ secrets.GCP_PROJECT_ID }}

    # Carica i dati dalla cartella locale al bucket Google Cloud
    - name: Carica dati sul bucket Google Cloud Storage
      run: |
        echo "Contenuto della cartella data:"
        ls -la ./data/
        gsutil -m cp -r ./data/* gs://${{ secrets.GCP_BUCKET_NAME_TERRAFORM }}/raw
        echo "Dati caricati con successo su gs://${{ secrets.GCP_BUCKET_NAME_TERRAFORM }}/raw"


  build-and-push-images:
    name: Build e Push Docker Images
    runs-on: ubuntu-latest
    needs: setup-and-upload-data

    strategy:
      matrix:
        service: [api_service, preprocessing_service, recommender_service, ui_service]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    # Autenticazione con Google Cloud (approccio aggiornato)
    - name: Google Auth
      id: auth
      uses: google-github-actions/auth@v1
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v1
      with:
        project_id: ${{ secrets.GCP_PROJECT_ID }}

    # Configurazione Docker per l'autenticazione con Artifact Registry
    - name: Configura Docker per Artifact Registry
      run: |
        gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

    # Costruzione dell'immagine Docker per ogni servizio
    - name: Build immagine Docker per ${{ matrix.service }}
      run: |
        echo "Building Docker image per ${{ matrix.service }}"
        cd ${{ matrix.service }}
        docker build -t ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REPOSITORY_TERRAFORM }}/${{ matrix.service }}:${{ github.sha }} .
        docker tag ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REPOSITORY_TERRAFORM }}/${{ matrix.service }}:${{ github.sha }} ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REPOSITORY_TERRAFORM }}/${{ matrix.service }}:latest

    # Push dell'immagine su Artifact Registry
    - name: Push immagine ${{ matrix.service }} su Artifact Registry
      run: |
        docker push ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REPOSITORY_TERRAFORM }}/${{ matrix.service }}:${{ github.sha }}
        docker push ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REPOSITORY_TERRAFORM }}/${{ matrix.service }}:latest
