name: Carica dati e pubblica immagini Docker

on:
  push:
    branches: cloud-provider
  workflow_dispatch:  # Per attivare manualmente il workflow

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  SERVICE_ACCOUNT: ${{ secrets.GCP_SA_KEY }}

jobs:
  setup-and-upload-data:
    name: Setup e Carica dati
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    # Autenticazione con Google Cloud
    - name: Set up Google Cloud SDK
      uses: google-github-actions/setup-gcloud@v1
      with:
        service_account_key: ${{ secrets.GCP_SA_KEY }}
        project_id: ${{ secrets.GCP_PROJECT_ID }}
        export_default_credentials: true

    # Carica i dati dalla cartella locale al bucket Google Cloud
    - name: Carica dati sul bucket Google Cloud Storage
      run: |
        echo "Contenuto della cartella data:"
        ls -la ./data/
        gsutil -m cp -r ./data/* gs://${{ secrets.GCP_BUCKET_NAME }}/
        echo "Dati caricati con successo su gs://${{ secrets.GCP_BUCKET_NAME }}/"

  build-and-push-images:
    name: Build e Push Docker Images
    runs-on: ubuntu-latest
    needs: setup-and-upload-data

    strategy:
      matrix:
        service: [api_service, preprocessing_service, recommender_service, ui_service]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    # Autenticazione con Google Cloud
    - name: Set up Google Cloud SDK
      uses: google-github-actions/setup-gcloud@v1
      with:
        service_account_key: ${{ secrets.GCP_SA_KEY }}
        project_id: ${{ secrets.GCP_PROJECT_ID }}
        export_default_credentials: true

    # Configurazione Docker per l'autenticazione con Artifact Registry
    - name: Configura Docker per Artifact Registry
      run: |
        gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

    # Costruzione dell'immagine Docker per ogni servizio
    - name: Build immagine Docker per ${{ matrix.service }}
      run: |
        echo "Building Docker image per ${{ matrix.service }}"
        cd ${{ matrix.service }}
        docker build -t ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REPOSITORY }}/${{ matrix.service }}:${{ github.sha }} .
        docker tag ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REPOSITORY }}/${{ matrix.service }}:${{ github.sha }} ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REPOSITORY }}/${{ matrix.service }}:latest

    # Push dell'immagine su Artifact Registry
    - name: Push immagine ${{ matrix.service }} su Artifact Registry
      run: |
        docker push ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REPOSITORY }}/${{ matrix.service }}:${{ github.sha }}
        docker push ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REPOSITORY }}/${{ matrix.service }}:latest
