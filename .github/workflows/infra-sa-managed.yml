name: Assign IAM Role to Service Account

on:
  workflow_dispatch:
  push:
    branches:
        - cloud-provider-testing-feature
    paths:
        - '.github/workflows/infra-sa-managed.yml'


jobs:
  assign-role:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Google Auth
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY_2 }}
  
      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Assign roles/iam.serviceAccountAdmin
        run: |
          SA_EMAIL="service-account-gke-managment@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com"
          PROJECT_ID="${{ secrets.GCP_PROJECT_ID }}"

          echo "Assegno ruolI  a $SA_EMAIL"

          ROLES=(
            "roles/resourcemanager.projectIamAdmin"
          )

          for ROLE in "${ROLES[@]}"; do
            echo "Assigning $ROLE to $SA_EMAIL"
            gcloud projects add-iam-policy-binding "${{ secrets.GCP_PROJECT_ID }}" \
              --member="serviceAccount:$SA_EMAIL" \
              --role="$ROLE" \
              --quiet
          done