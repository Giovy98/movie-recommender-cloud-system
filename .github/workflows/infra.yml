name: GCP Infrastructure Provisioning

on:
  workflow_dispatch:
  push:
    paths:
      - 'terraform-gcp/**'
      - '.github/workflows/infra.yml'

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  TF_VERSION: '1.5.0'
  WORKING_DIR: './terraform-gcp'
  TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
  TF_VAR_region: ${{ secrets.GCP_REGION }}
  TF_VAR_bucket_name: ${{ secrets.GCP_BUCKET_NAME }}
  TF_VAR_artifact_repository: ${{ secrets.ARTIFACT_REPOSITORY }}

jobs:
  provision-infrastructure:
    name: Provision GCP Infrastructure
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Terraform
      uses: hashicorp/setup-terraform@v2
      with:
        terraform_version: ${{ env.TF_VERSION }}
        terraform_wrapper: false

    - name: Google Auth
      id: auth
      uses: google-github-actions/auth@v1
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Save service key
      working-directory: ${{ env.WORKING_DIR }}
      run: echo '${{ secrets.GCP_SA_KEY }}' > sa-key.json

    - name: Terraform init
      working-directory: ${{ env.WORKING_DIR }}
      run: terraform init

    - name: Terraform format
      working-directory: ${{ env.WORKING_DIR }}
      run: terraform fmt -recursive

    - name: Terraform validate
      working-directory: ${{ env.WORKING_DIR }}
      run: terraform validate

    - name: Terraform plan
      working-directory: ${{ env.WORKING_DIR }}
      run: terraform plan -no-color

    - name: Terraform apply
      working-directory: ${{ env.WORKING_DIR }}
      run: terraform apply -auto-approve

    - name: Clean up
      if: always()
      working-directory: ${{ env.WORKING_DIR }}
      run: rm -f sa-key.json
